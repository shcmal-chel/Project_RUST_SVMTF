[package]
name = "traffic_simulation"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[[bin]]
name = "traffic_sim"
path = "src/main.rs"

[dependencies]
# CLI
ratatui = "0.24"
crossterm = "0.27"

# Сериализация
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"

# WASM
wasm-bindgen = "0.2"
js-sys = "0.3"
wasm-bindgen-futures = "0.4"
serde-wasm-bindgen = "0.6"
console_error_panic_hook = "0.1"

# Другое
chrono = "0.4"
rand = "0.8"
log = "0.4"
env_logger = "0.10"
thiserror = "1.0"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4"] }

[dev-dependencies]
tempfile = "3.8"