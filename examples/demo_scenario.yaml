name: "Evening Rush Hour"
description: "Increased traffic intensity during peak hours"
duration: 3600  # seconds
events:
  - time: 0
    type: "set_spawn_rate"
    target: "entry_1"
    value: 0.5
  
  - time: 1800
    type: "set_spawn_rate"
    target: "entry_1"
    value: 0.8
  
  - time: 3000
    type: "set_traffic_light_phase"
    target: "light_1"
    value: 2  # Change to phase 2 (longer green for cross street)
  
  - time: 3500
    type: "set_spawn_rate"
    target: "entry_1"
    value: 0.3